name: Acquire Unity license (uruchom RAZ)

# Jednorazowy helper. Odpal ręcznie (Actions -> ten workflow -> Run).
# Pobierze artifact Unity_v6000.alf -> wgraj go na https://license.unity3d.com/manual
# -> dostaniesz plik .ulf -> jego CAŁĄ zawartość wklej do sekretu UNITY_LICENSE.
on:
  workflow_dispatch:

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: game-ci/unity-request-activation-file@v2
        id: alf
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.alf.outputs.filePath }}
          path: ${{ steps.alf.outputs.filePath }}
