name: Build Windows

# Build odpala się przy pushu taga v* (np. v0.7) albo ręcznie z zakładki Actions.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      # Cache Library — bez tego Unity re-importuje wszystko za każdym razem (~15 min dłużej).
      - uses: actions/cache@v4
        with:
          path: AlkoOlimpiada/Library
          key: Library-${{ hashFiles('AlkoOlimpiada/Assets/**', 'AlkoOlimpiada/Packages/**', 'AlkoOlimpiada/ProjectSettings/**') }}
          restore-keys: Library-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: AlkoOlimpiada
          targetPlatform: StandaloneWindows64
          buildName: AlkoOlimpiada

      # game-ci wypluwa build do build/StandaloneWindows64/ — pakujemy i wrzucamy na release.
      - name: Zip
        run: cd build/StandaloneWindows64 && zip -r ../../AlkoOlimpiada-Win.zip .

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AlkoOlimpiada-Win.zip

      # Ręczny run (workflow_dispatch) nie ma taga — wtedy tylko artifact do pobrania z Actions.
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: AlkoOlimpiada-Win
          path: AlkoOlimpiada-Win.zip
